# Starship prompt config ‚ÄĒ powerline "rainbow" style.
#
# COLORS: the 16 named ANSI colors (red, yellow, green, blue, cyan, bright-black)
# instead of a hardcoded palette. The terminal resolves them from its active
# theme, so this prompt tracks whatever Ghostty theme is set. Under Spacedust:
#   red    ‚Üí #e35b00 (orange)    yellow ‚Üí #e3cd7b (sand)   green ‚Üí #5cab96 (teal)
#   blue   ‚Üí #0f548b (deep blue) cyan   ‚Üí #06afc7 (cyan)   bright-black ‚Üí #684c31
# Switch Ghostty themes and the prompt recolors itself ‚ÄĒ no edits here.
#
# GLYPHS: powerline dividers and icons are written as explicit \uXXXX escapes so
# the exact codepoint is guaranteed (pasted glyphs can silently corrupt into
# look-alikes like the box-drawing "|", which renders as a tacky straight line).
# Escapes only decode inside "double-quoted" strings, not 'literal' ones.
# Requires a Nerd Font; Ghostty ships JetBrains Mono NF.
#   Óā∂ = rounded left cap   Óāį = chevron divider   Óāī = rounded right cap
#   Óā† = git branch   ÔÖĻ = apple   ÔÄ£ = lock   ÔÄó = clock
#
# Rainbow order (each segment a chevron apart):
#   os(orange) ‚Äļ directory(sand) ‚Äļ git(teal) ‚Äļ languages(blue) ‚Äļ tools(cyan) ‚Äļ time(grey)
# Language/tool segments are auto-contextual ‚ÄĒ each only appears in a matching
# project, so a plain dir just shows os ‚Äļ directory ‚Äļ git ‚Äļ time.

"$schema" = 'https://starship.rs/config-schema.json'

# Blank line before each prompt.
add_newline = true

# Give git status room to compute on big repos instead of blanking.
command_timeout = 1000

# One continuous powerline: rounded cap, chevron-separated segments, rounded cap,
# then the prompt char drops to a second line.
format = """
[Óā∂](fg:red)\
$os\
[Óāį](fg:red bg:yellow)\
$directory\
[Óāį](fg:yellow bg:green)\
$git_branch\
$git_status\
[Óāį](fg:green bg:blue)\
$python\
$rust\
$golang\
$ruby\
$php\
$lua\
[Óāį](fg:blue bg:cyan)\
$docker_context\
$terraform\
$direnv\
[Óāį](fg:cyan bg:bright-black)\
$cmd_duration\
$time\
[Óāī](fg:bright-black)\
$line_break$character"""

# OS: apple on orange. Only the current OS's symbol ever renders (no Windows/etc.).
[os]
disabled = false
style = 'fg:bright-white bg:red'
format = '[ $symbol ]($style)'

[os.symbols]
Macos = "ÔÖĻ"

# Directory: dark text on sand, compact 3-segment truncation, icons for common dirs.
[directory]
style = 'fg:black bg:yellow'
format = '[ $path$read_only ]($style)'
truncation_length = 3
truncation_symbol = '‚Ä¶/'
read_only = " ÔÄ£"

[directory.substitutions]
"Developer" = "ÔĄ° "
"Documents" = "ÔÖú "
"Downloads" = "ÔÄô "
"Desktop" = "ÔĄą "

# Branch: powerline branch icon, dark text on teal.
[git_branch]
symbol = "Óā† "
style = 'fg:black bg:green'
format = '[ $symbol$branch ]($style)'

# Git status: same teal segment, compact counters.
[git_status]
style = 'fg:black bg:green'
format = '[$all_status$ahead_behind ]($style)'

# --- Language segments (blue). Each only renders in a matching project. --------
# Symbols are Starship's Nerd Font defaults. Add/remove modules freely.
[python]
style = 'fg:bright-white bg:blue'
format = '[ $symbol( $version) ]($style)'

[rust]
style = 'fg:bright-white bg:blue'
format = '[ $symbol( $version) ]($style)'

[golang]
style = 'fg:bright-white bg:blue'
format = '[ $symbol( $version) ]($style)'

[ruby]
style = 'fg:bright-white bg:blue'
format = '[ $symbol( $version) ]($style)'

[php]
style = 'fg:bright-white bg:blue'
format = '[ $symbol( $version) ]($style)'

[lua]
style = 'fg:bright-white bg:blue'
format = '[ $symbol( $version) ]($style)'

# --- Tooling segments (cyan). Each only renders when relevant. -----------------
[docker_context]
style = 'fg:black bg:cyan'
format = '[ $symbol( $context) ]($style)'

[terraform]
style = 'fg:black bg:cyan'
format = '[ $symbol( $workspace) ]($style)'

[direnv]
disabled = false
style = 'fg:black bg:cyan'
format = '[ $symbol$loaded/$allowed ]($style)'

# --- Grey tail segment --------------------------------------------------------
# Command duration: only for commands over 3s.
[cmd_duration]
min_time = 3000
style = 'fg:bright-white bg:bright-black'
format = '[ $duration ]($style)'

# Clock: 24-hour, closes out the grey segment.
[time]
disabled = false
time_format = '%R'
style = 'fg:bright-white bg:bright-black'
format = "[ ÔÄó $time ]($style)"

# Prompt char on line two: green ‚ĚĮ on success, red ‚ĚĮ on error; ‚Ěģ in vi command mode.
[character]
success_symbol = '[‚ĚĮ](bold fg:green)'
error_symbol = '[‚ĚĮ](bold fg:red)'
vimcmd_symbol = '[‚Ěģ](bold fg:green)'
